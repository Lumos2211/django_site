{% extends "todo_app/base.html" %}

{% block title %}Update #{{ object.id }}{% endblock title %}

{% block body %}
    <h3>Update Todo</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Update">
    </form>

    <div>
        <a href="{% url 'todo_app:detail' object.pk %}"
        >Back to ToDo Item details</a>
    </div>
{% endblock body %}
