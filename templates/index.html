{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}Welcome — My Django Site{% endblock %}</title>
    <style>
        :root{--bg:#f7fafc;--card:#fff;--muted:#6b7280;--accent:#2563eb}
        html,body{height:100%}
        body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:var(--bg);color:#111}
        .wrap{min-height:100%;display:flex;flex-direction:column}
        header{background:linear-gradient(90deg,#0ea5e9 0,#2563eb 100%);color:#fff;padding:1rem 1.25rem}
        .container{max-width:900px;margin:0 auto;width:100%}
        nav{display:flex;gap:1rem;align-items:center}
        a.navlink{color:rgba(255,255,255,.95);text-decoration:none;font-weight:600}
        main{flex:1;padding:2.25rem 1.25rem}
        .card{background:var(--card);padding:1.25rem;border-radius:8px;box-shadow:0 6px 20px rgba(2,6,23,.06)}
        footer{padding:1rem 1.25rem;color:var(--muted);font-size:.9rem;background:transparent;text-align:center}
        .hero{display:grid;gap:1rem}
        .actions{margin-top:.75rem}
        .btn{display:inline-block;padding:.5rem .9rem;border-radius:6px;text-decoration:none;color:#fff;background:var(--accent);font-weight:600}
        @media(min-width:700px){main{padding:3rem 0}.hero{grid-template-columns:1fr 320px;align-items:center;gap:2rem}}
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div class="container">
                <nav>
                    <div style="font-size:1.125rem;font-weight:700">My Django Site</div>
                    <div style="margin-left:auto;display:flex;gap:.5rem">
                        <a class="navlink" href="{% url 'admin:index' %}">Admin</a>
                    </div>
                </nav>
            </div>
        </header>

        <main>
            <div class="container">
                <div class="card hero">
                    <section>
                        <h1 style="margin:0 0 .25rem 0">Welcome to my Django site</h1>
                        <p style="margin:0;color:var(--muted)">
                            This is a minimal base template. Use this page as a starting point to build your app.
                        </p>

                        <div class="actions">
                            <a class="btn" href="{% url 'admin:index' %}">Open Admin</a>
                            <a style="margin-left:.5rem;color:var(--accent);text-decoration:none;font-weight:600" href="https://docs.djangoproject.com/">Docs</a>
                        </div>

                    </section>
                </div>

                {% block content %}
                <!-- Page-specific content can be inserted here by extending templates -->
                {% endblock %}
            </div>
        </main>

        <footer>
            <div class="container">© {%now "jS F Y"%} My Django Site</div>
        </footer>
    </div>
</body>
</html>
